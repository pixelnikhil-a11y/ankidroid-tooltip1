name: Build AnkiCopy APK

# Builds the debug APK (and optionally an unsigned release APK) on every
# push/PR touching the app, and lets you trigger it manually. The APK is
# published as a downloadable workflow artifact - see the "Actions" tab on
# GitHub, open the latest run, and grab it from "Artifacts" at the bottom.
#
# This build has a native (NDK/CMake) component - llama.cpp is vendored as
# a git submodule - so this workflow is heavier and slower than a plain
# Kotlin-only Android build (~15-25 min instead of ~3-5 min). That's normal.

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}   # lets you click "Run workflow" manually on GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo (with submodules)
        uses: actions/checkout@v4
        with:
          # llama.cpp lives at app/src/main/cpp/llama.cpp as a submodule -
          # without this the CMake build fails immediately with
          # "llama.cpp does not contain a CMakeLists.txt".
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install NDK + CMake
        # Version pinned here MUST match app/build.gradle's ndkVersion, or
        # Gradle will silently try to download a second copy mid-build and
        # occasionally pick the wrong one on Actions' pre-baked SDK image.
        run: |
          sdkmanager --install "ndk;26.1.10909125"
          sdkmanager --install "cmake;3.22.1"

      - name: Cache Gradle + NDK build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
            app/.cxx
          # llama.cpp's C++ sources are the slow part to recompile - this
          # cache key changes only when native/build sources actually
          # change, so unrelated Kotlin-only commits reuse the prior
          # native build instead of recompiling llama.cpp from scratch.
          key: ${{ runner.os }}-gradle-ndk-${{ hashFiles('**/*.gradle', 'app/src/main/cpp/**') }}
          restore-keys: |
            ${{ runner.os }}-gradle-ndk-

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace --no-daemon

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnkiCopy-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

  # Optional second job: builds an UNSIGNED release APK too (smaller,
  # optimized, but Android won't install it until it's signed - either
  # sign it yourself locally with apksigner, or just use the debug APK
  # from the job above for day-to-day sideloading, which installs as-is).
  build-release-unsigned:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repo (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install NDK + CMake
        run: |
          sdkmanager --install "ndk;26.1.10909125"
          sdkmanager --install "cmake;3.22.1"

      - name: Cache Gradle + NDK build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
            app/.cxx
          key: ${{ runner.os }}-gradle-ndk-${{ hashFiles('**/*.gradle', 'app/src/main/cpp/**') }}
          restore-keys: |
            ${{ runner.os }}-gradle-ndk-

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build unsigned release APK
        run: gradle assembleRelease --stacktrace --no-daemon

      - name: Upload unsigned release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnkiCopy-release-unsigned-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30
